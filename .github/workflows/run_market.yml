name: 📊 Run Market

on:
  schedule:
    # KST 01:30 월/수 = UTC 16:30 일/화
    - cron: '30 16 * * 0,2'
  workflow_dispatch:
    inputs:
      target_date:
        description: '실행 대상 날짜 (YYYY-MM-DD, 미입력 시 오늘)'
        required: false
        default: ''
      force:
        description: '공휴일/주말 강제 실행 여부 (true/false)'
        required: false
        default: 'false'
      stage:
        description: '실행 단계 (all/data/analysis/narrative/persist/image)'
        required: false
        default: 'all'
      scenario_v2:
        description: 'Scenario v2.0 활성화 (true=Shadow Run / false=기존 로직)'
        required: false
        default: 'false'

permissions:
  contents: read
  actions: write

concurrency:
  group: icg-${{ github.event.inputs.target_date || 'today' }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: ICG Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TZ: Asia/Seoul
      NOTION_NARRATIVE_SYSTEM_ID: '3439208cbdc3810d9e7ceb5f48f8f093'
      NOTION_NARRATIVE_USER_ID: '3439208cbdc3816bb578d7355b3a1966'
      NOTION_IMAGE_PROMPTS_ID: '3439208cbdc3817191e1c2cccd3865cc'
      NOTION_BATTLE_CONSTANTS_ID: '3439208cbdc3817bbdf9dbdb272508b8'
      NOTION_REF_PROMPTS_ID: '3439208cbdc381ccb85cf8e177a1a3d2'

      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_SUB_PAY_KEY: ${{ secrets.GEMINI_API_SUB_PAY_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      LUNAR_CRUSH_API_KEY: ${{ secrets.LUNAR_CRUSH_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SCHEMA: icg
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_TRACKER_DS: '485ba577-0512-45fd-9445-b9e86c53d88b'
      DRY_RUN: 'false'
      FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
      SCENARIO_V2_ENABLED: ${{ github.event.inputs.scenario_v2 || 'false' }}
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install CJK fonts (PIL 한국어 렌더링)
        run: sudo apt-get install -y fonts-noto-cjk --no-install-recommends -q

      - name: STEP 2 — Data Ingest
        if: ${{ github.event.inputs.stage == '' || github.event.inputs.stage == 'all' || github.event.inputs.stage == 'data' }}
        run: |
          python -m scripts.run_market \
            --stage data \
            ${{ github.event.inputs.target_date && format('--date {0}', github.event.inputs.target_date) || '' }}

      - name: STEP 3 — Analysis
        if: ${{ github.event.inputs.stage == '' || github.event.inputs.stage == 'all' || github.event.inputs.stage == 'analysis' }}
        run: |
          python -m scripts.run_market \
            --stage analysis \
            ${{ github.event.inputs.target_date && format('--date {0}', github.event.inputs.target_date) || '' }}

      - name: STEP 4 — Narrative (Claude)
        if: ${{ github.event.inputs.stage == '' || github.event.inputs.stage == 'all' || github.event.inputs.stage == 'narrative' }}
        run: |
          python -m scripts.run_market \
            --stage narrative \
            ${{ github.event.inputs.target_date && format('--date {0}', github.event.inputs.target_date) || '' }}

      - name: STEP 5 — Persist
        if: ${{ github.event.inputs.stage == '' || github.event.inputs.stage == 'all' || github.event.inputs.stage == 'persist' }}
        run: |
          python -m scripts.run_market \
            --stage persist \
            ${{ github.event.inputs.target_date && format('--date {0}', github.event.inputs.target_date) || '' }}

      - name: STEP 6 — Image Generation (Gemini)
        if: ${{ github.event.inputs.stage == '' || github.event.inputs.stage == 'all' || github.event.inputs.stage == 'image' }}
        run: |
          python -m scripts.run_market \
            --stage image \
            ${{ github.event.inputs.target_date && format('--date {0}', github.event.inputs.target_date) || '' }}

      - name: PAUSE — Dialog Gate
        run: |
          echo "✅ STEP 2~6 완료."
          echo "📝 schedule 실행: resume_episode.yml이 KST 05:00에 자동 실행됩니다."
          echo "🔰 SCENARIO_V2_ENABLED=${{ env.SCENARIO_V2_ENABLED }}"

      - name: Upload Episode Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: episode-${{ github.run_id }}
          path: output/episodes/
          retention-days: 14

      - name: Notify Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
        run: python -m scripts.notify_failure
