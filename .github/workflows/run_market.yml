name: 📊 Run Market

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '실행 대상 날짜 (YYYY-MM-DD, 미입력 시 오늘)'
        required: false
        default: ''
      force:
        description: '공휴일/주말 강제 실행 여부 (true/false)'
        required: false
        default: 'false'
      stage:
        description: '실행 단계 (all/data/analysis/narrative/persist/image)'
        required: false
        default: 'all'

permissions:
  contents: read
  actions: write

concurrency:
  group: icg-${{ github.event.inputs.target_date || 'today' }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: ICG Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TZ: Asia/Seoul
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_SUB_PAY_KEY: ${{ secrets.GEMINI_API_SUB_PAY_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      LUNAR_CRUSH_API_KEY: ${{ secrets.LUNAR_CRUSH_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SCHEMA: icg
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_TRACKER_DS: '485ba577-0512-45fd-9445-b9e86c53d88b'
      DRY_RUN: 'false'
      FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install CJK fonts
        run: sudo apt-get install -y fonts-noto-cjk --no-install-recommends -q

      # ── 단일 프로세스로 전체 실행 ─────────────────────────────────────────
      - name: Run Pipeline
        run: |
          python -m scripts.run_market \
            --stage ${{ github.event.inputs.stage || 'all' }} \
            ${{ github.event.inputs.target_date != '' && format('--date {0}', github.event.inputs.target_date) || '' }}

      - name: Upload Episode Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: episode-${{ github.run_id }}
          path: output/episodes/
          retention-days: 14

      - name: Notify Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
        run: python -m scripts.notify_failure
