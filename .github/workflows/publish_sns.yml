name: 🚀 Publish SNS

on:
  schedule:
    # KST 월/수 06:00 = UTC 화/토
    - cron: '0 21 * * 6,2,4'
  workflow_dispatch:
    inputs:
      episode_id:
        description: '에피소드 ID (예: ICG-2026-04-15-004). 미입력 시 최신 assembled 자동 선택.'
        required: false
        default: ''
      channels:
        description: '발행 채널 (telegram / x / all)'
        required: true
        default: 'telegram'
      confirm:
        description: '발행 확인 (YES 입력 필수)'
        required: true
        default: 'NO'

permissions:
  contents: read
  actions: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 사전 점검 + episode_id / slides_run_id 결정
  # ──────────────────────────────────────────────
  pre-check:
    name: Pre-flight Check
    runs-on: ubuntu-latest
    outputs:
      episode_id:    ${{ steps.resolve.outputs.episode_id }}
      slides_run_id: ${{ steps.resolve.outputs.slides_run_id }}
    env:
      DRY_RUN:      "false"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm guard (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "❌ confirm=YES 미입력. 발행 중단."
            exit 1
          fi

      - name: Resolve episode & slides run id
        id: resolve
        env:
          INPUT_EPISODE_ID: ${{ github.event.inputs.episode_id }}
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m scripts.resolve_episode \
            --episode-id "$INPUT_EPISODE_ID" \
            >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Job 2: 실제 SNS 발행
  # ──────────────────────────────────────────────
  publish:
    name: Publish to SNS
    needs: pre-check
    runs-on: ubuntu-latest
    if: needs.pre-check.outputs.episode_id != ''
    env:
      DRY_RUN:                    "false"
      SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:               ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_FREE_CHANNEL_ID:   ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
      TELEGRAM_PAID_CHANNEL_ID:   ${{ secrets.TELEGRAM_PAID_CHANNEL_ID }}
      X_API_KEY:                  ${{ secrets.X_API_KEY }}
      X_API_SECRET:               ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN:             ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET:      ${{ secrets.X_ACCESS_TOKEN_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Assembled Slides (from Resume Episode run)
        if: needs.pre-check.outputs.slides_run_id != ''
        uses: actions/download-artifact@v4
        with:
          pattern: slides-*
          path: output/episodes/
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.pre-check.outputs.slides_run_id }}

      - name: Check slides availability
        run: |
          echo "=== 슬라이드 파일 확인 ==="
          find output/episodes -name "S*.png" 2>/dev/null | sort || echo "슬라이드 없음"
          echo "=== episode_id: ${{ needs.pre-check.outputs.episode_id }} ==="

      - name: Anti-bot random delay
        run: |
          # 60~360초(1~6분) 랜덤 — 동일 시각 반복 발행 패턴 회피
          DELAY=$((RANDOM % 301 + 60))
          echo "⏱️ Random delay: ${DELAY}s ($((DELAY/60))m $((DELAY%60))s)"
          sleep "$DELAY"

      - name: STEP 8 — Publish SNS
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CHANNELS="all"
          else
            CHANNELS="${{ github.event.inputs.channels }}"
          fi

          EID="${{ needs.pre-check.outputs.episode_id }}"
          if [ -n "$EID" ]; then
            python -m scripts.run_publish --episode "$EID" --channels "$CHANNELS"
          else
            python -m scripts.run_publish --channels "$CHANNELS"
          fi

      - name: Notify Failure
        if: failure()
        run: python -m scripts.notify_failure
