name: Run Video Trailer (ICG Video Track)

on:
  schedule:
    # 토요일 KST 09:00 = UTC 00:00 (토)
    - cron: '0 0 * * 6'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'YYYY-MM-DD (empty = today KST)'
        required: false
      dry_run:
        description: 'true = no actual API calls'
        required: false
        default: 'true'
      log_level:
        description: 'Console log level (DEBUG shows more detail)'
        required: false
        default: 'INFO'
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
      operation_mode:
        description: 'manual_prompt=텔레그램 프롬프트 전송(수기 생성), full_pipeline=Veo/assembly/gate 실행'
        required: false
        default: 'manual_prompt'
        type: choice
        options:
          - manual_prompt
          - full_pipeline

permissions:
  contents: read
  actions: write

jobs:
  video_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: icg-video-${{ github.event.inputs.target_date || 'today' }}
      cancel-in-progress: false
    env:
      TZ: Asia/Seoul
      # ── Core APIs (ICG 레포 규약 준수) ───────────────────────────
      ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_SUB_PAY_KEY:   ${{ secrets.GEMINI_API_SUB_PAY_KEY }}    # Veo + TTS 공용 Paid 키
      FRED_API_KEY:             ${{ secrets.FRED_API_KEY }}
      NOTION_API_KEY:           ${{ secrets.NOTION_API_KEY }}
      # ── Supabase ─────────────────────────────────────────────────
      SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:             ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SCHEMA:          icg
      # ── X (Twitter) ──────────────────────────────────────────────
      X_API_KEY:                ${{ secrets.X_API_KEY }}
      X_API_SECRET:             ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN:           ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET:    ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      # ── Telegram (게이트 + 채널) ─────────────────────────────────
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
      TELEGRAM_PAID_CHANNEL_ID: ${{ secrets.TELEGRAM_PAID_CHANNEL_ID }}
      MASTER_CHAT_ID:           ${{ secrets.MASTER_CHAT_ID }}            # ⚠️ Phase V5 게이트 전 등록 필요
      # ── YouTube Shorts (Phase V5 시작 시 주석 해제) ──────────────
      # YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
      # YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      # YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      # ── Runtime flags ───────────────────────────────────────────
      VIDEO_BUDGET_USD_MONTHLY: '80'
      DRY_RUN:                  ${{ github.event.inputs.dry_run || 'false' }}
      LOG_LEVEL:                ${{ github.event.inputs.log_level || 'INFO' }}
      OPERATION_MODE:           ${{ github.event.inputs.operation_mode || 'manual_prompt' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements-video.txt

      - name: STEP 1V-2V data load
        run: python -m scripts.run_video_trailer --stage data

      - name: STEP 3V scenario
        run: python -m scripts.run_video_trailer --stage scenario

      - name: STEP 4V narrative
        run: python -m scripts.run_video_trailer --stage narrative

      - name: STEP 5V persist init
        if: ${{ env.OPERATION_MODE == 'full_pipeline' }}
        run: python -m scripts.run_video_trailer --stage persist_init

      - name: STEP 6V veo generate
        if: ${{ env.OPERATION_MODE == 'full_pipeline' }}
        run: python -m scripts.run_video_trailer --stage veo

      - name: STEP 7V ffmpeg assembly
        if: ${{ env.OPERATION_MODE == 'full_pipeline' }}
        run: python -m scripts.run_video_trailer --stage assembly

      - name: PAUSE human gate notify
        if: ${{ env.OPERATION_MODE == 'full_pipeline' }}
        run: python -m scripts.run_video_trailer --stage gate_notify

      - name: PRE-OP manual prompt notify (Telegram)
        if: ${{ env.OPERATION_MODE == 'manual_prompt' }}
        run: python -m scripts.run_video_trailer --stage manual_prompt_notify

      - name: Summarize logs
        if: always()
        run: |
          echo "::group::Log files generated"
          find logs -type f -name "*.log" 2>/dev/null | sort || echo "(no logs directory)"
          echo "::endgroup::"
          echo "::group::Full log tail (last 40 lines per file)"
          for f in $(find logs -type f -name "*.log" 2>/dev/null | sort); do
            echo "---------- $f ----------"
            tail -40 "$f"
          done
          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-${{ github.run_id }}
          path: |
            output/videos/
            output/manual_prompts/
            logs/
          retention-days: 30
