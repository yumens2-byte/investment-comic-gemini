name: 🔄 Resume Episode

on:
  workflow_dispatch:
    inputs:
      episode_id:
        description: '에피소드 ID (예: ICG-2026-04-14-001)'
        required: false
      force:
        description: '기존 assembled 상태 덮어쓰기 (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  resume:
    name: Resume — PIL Assembly
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
        TZ: Asia/Seoul
        NOTION_NARRATIVE_SYSTEM_ID: '3439208cbdc3810d9e7ceb5f48f8f093'
        NOTION_NARRATIVE_USER_ID: '3439208cbdc3816bb578d7355b3a1966'
        NOTION_IMAGE_PROMPTS_ID: '3439208cbdc3817191e1c2cccd3865cc'
        NOTION_BATTLE_CONSTANTS_ID: '3439208cbdc3817bbdf9dbdb272508b8'
        NOTION_REF_PROMPTS_ID: '3439208cbdc381ccb85cf8e177a1a3d2'
        
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GEMINI_API_SUB_PAY_KEY: ${{ secrets.GEMINI_API_SUB_PAY_KEY }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        LUNAR_CRUSH_API_KEY: ${{ secrets.LUNAR_CRUSH_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_SCHEMA: icg
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_TRACKER_DS: '485ba577-0512-45fd-9445-b9e86c53d88b'
        DRY_RUN: 'false'
        FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
        PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install CJK fonts
        run: sudo apt-get install -y fonts-noto-cjk --no-install-recommends -q

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Episode Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: episode-*
          path: output/episodes/
          merge-multiple: true

      # ── STEP 7: PIL Assembly (dialog_edits_json 적용) ────────────────────
      - name: STEP 7 — Assembly
        run: |
          # 수정 후 (shell if-else)
          if [ -n "${{ github.event.inputs.episode_id }}" ]; then
            python -m scripts.run_resume --episode "${{ github.event.inputs.episode_id }}"
          else
            python -m scripts.run_resume  # 자동 선택
          fi

      - name: Upload Assembled Slides
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slides-${{ github.event.inputs.episode_id }}
          path: output/episodes/
          retention-days: 14

      - name: Notify Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
        run: python -m scripts.notify_failure
