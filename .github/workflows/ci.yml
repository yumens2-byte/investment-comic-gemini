name: ✅ CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lint deps
        run: pip install ruff black

      - name: ruff check
        run: ruff check . --line-length=100

      - name: black check
        run: black --check --line-length=100 .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    # ── CI용 mock 환경변수 — 실제 API 호출 없음 ─────────────────────────────
    env:
      ANTHROPIC_API_KEY: sk-ant-test-00000000000000000000000000
      # ⚠️ GEMINI_API_SUB_PAY_KEY (Gemini). GEMINI_API_KEY 이름 사용 금지 (doc 19)
      GEMINI_API_SUB_PAY_KEY: AIzaTestKey1234567890abcdefghijklmno
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.test
      SUPABASE_SCHEMA: icg
      NOTION_API_KEY: ntn_test00000000000000000000000000000000000000
      FRED_API_KEY: test_fred_key
      DRY_RUN: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Upload coverage (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 7
