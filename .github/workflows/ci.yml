name: ✅ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: .
      ANTHROPIC_API_KEY: sk-ant-test
      GEMINI_API_SUB_PAY_KEY: AIzaTest
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: eyJtest
      NOTION_API_KEY: ${NOTION_API_KEY}
      DRY_RUN: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check . --line-length=100

      - name: Test (pytest)
        run: python -m pytest tests/ -v
